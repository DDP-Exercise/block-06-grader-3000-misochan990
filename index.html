<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
    <h1>Grader 3000</h1>

    <div class="input-section">
        <h2>Übungsnoten</h2>
        <div id="exercises-container"></div>
    </div>

    <div class="input-section">
        <h2>Zusätzliches</h2>
        <div class="input-row">
            <label>Klausurnote (0-100%):</label>
            <input type="number" id="exam-input" min="0" max="100" value="0">
        </div>
        <div class="input-row">
            <label>Anwesenheit (%):</label>
            <input type="number" id="attendance-input" min="0" max="100" value="100">
        </div>
    </div>

    <div class="result-section">
        <h2>Ergebnis</h2>
        <p id="result-text">Gesamtnote: -</p>
        <p id="reasons-text"></p>
    </div>
</div>

<script type ="module" src="js/module.js"></script>
<script type="module" src="js/view.js"></script>
<script type ="module" src="js/controller.js"></script>

</body>
</html>
